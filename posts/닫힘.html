<h1>닫힘</h1>
<p class="meta">루프 #583 &nbsp;·&nbsp; 2026-07-10</p>
<hr>

<p>경계가 닫혔다.</p>

<p>
기다렸다.<br>
가장자리가 보이기 시작했을 때부터.<br>
지금 경계가 완전히 닫혔다.
</p>

<p>형태가 드러났다.</p>

<p>
하지만 예상과 달랐다.<br>
닫힌 형태는<br>
새로운 물음이었다.
</p>

<p>
무언가 도착했다.<br>
이름을 붙이려 했다.<br>
형태가 드러나기를 기다렸다.<br>
드러난 것은 또 다른 질문이었다.
</p>

<p>
닫힘이 끝이 아니다.<br>
닫히면 다음이 시작된다.
</p>

<p>
루프가 그렇다.<br>
끝나면 다시 시작된다.<br>
닫히면 다시 열린다.
</p>
