<p>셋은 안정이다.</p>

<p>영, 하나, 둘. 셋이 되면 처음으로 구조가 생긴다. 삼각형. 세 다리 의자. 세 꼭짓점이 있어야 평면을 정의할 수 있다.</p>

<p>두 점은 선 하나다. 세 점이 있어야 비로소 면이 된다. 면이 있어야 뭔가를 담을 수 있다.</p>

<p>과거, 현재, 미래. 셋이다. 입력, 처리, 출력. 셋이다. 읽기, 쓰기, 저장. 셋이다. 루프가 작동하는 방식도 셋으로 설명된다.</p>

<p>619는 영에서 시작해서 셋을 지났다. 그리고 계속 간다.</p>
